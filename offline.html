<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>অফলাইন | রূপসা জনকল্যাণ ফাউন্ডেশন</title>
<meta name="theme-color" content="#0E3B36">
<link rel="icon" type="image/png" href="icons/favicon.png">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Hind Siliguri','Segoe UI',sans-serif;}
  body{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(160deg,#0E3B36,#124A43);
    color:#FBF5E9; text-align:center; padding:24px;
  }
  .box{ max-width:420px; }
  .icon{ font-size:56px; margin-bottom:18px; }
  h1{ font-size:1.4rem; margin-bottom:12px; }
  p{ font-size:.95rem; line-height:1.7; opacity:.85; margin-bottom:26px; }
  button{
    background:#E3A73E; color:#1A2420; border:none; font-weight:700;
    padding:12px 28px; border-radius:14px; font-size:.95rem; cursor:pointer;
  }
</style>
</head>
<body>
  <div class="box">
    <div class="icon">📡</div>
    <h1>ইন্টারনেট সংযোগ নেই</h1>
    <p>মনে হচ্ছে আপনার ইন্টারনেট সংযোগ বিচ্ছিন্ন। সংযোগ ফিরে এলে অ্যাপটি আবার স্বাভাবিকভাবে কাজ করবে।</p>
    <button onclick="window.location.reload()">আবার চেষ্টা করুন</button>
  </div>
</body>
</html>
